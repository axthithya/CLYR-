version: 2
updates:
  - package-ecosystem: nuget
    directory: "/"
    schedule:
      interval: weekly
      day: monday
      time: "06:00"
      timezone: "Etc/UTC"
    open-pull-requests-limit: 5
    labels: ["status:needs-evidence", "area:packaging-release"]
    commit-message:
      prefix: "deps"
  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: weekly
      day: monday
      time: "06:30"
      timezone: "Etc/UTC"
    open-pull-requests-limit: 3
    labels: ["status:needs-evidence", "area:packaging-release"]
    commit-message:
      prefix: "ci"
