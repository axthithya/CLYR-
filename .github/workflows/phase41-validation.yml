name: Phase 4.1 validation

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  polished-ui:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'
      - run: dotnet restore Clyr.sln --locked-mode
      - shell: powershell
        run: .\scripts\verify-phase41.ps1 -SkipUiAutomation
