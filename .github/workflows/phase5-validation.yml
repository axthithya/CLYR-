name: Phase 5 validation

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  validate:
    runs-on: windows-latest
    timeout-minutes: 35
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.301
      - name: Restore
        run: dotnet restore Clyr.sln --disable-parallel -m:1
      - name: Verify Phase 5 without desktop UI automation
        shell: powershell
        run: .\\scripts\\verify-phase5.ps1 -SkipUiAutomation

