name: New detection or cleanup-rule proposal
description: Propose detection knowledge; rules remain report-only until an approved action phase.
title: "[Rule]: "
labels: ["type:rule", "area:rules", "status:needs-evidence"]
body:
  - type: markdown
    attributes:
      value: |
        Community YAML cannot contain commands, executables, scripts, arbitrary paths, or elevation. The only current action is `report-only`.
  - type: input
    id: rule_id
    attributes:
      label: Proposed stable rule ID
      placeholder: developer.vendor.cache
    validations:
      required: true
  - type: textarea
    id: scope
    attributes:
      label: Narrow root token and detection evidence
      description: Use approved placeholders and fictional paths; explain false-positive boundaries and overlap ownership.
    validations:
      required: true
  - type: dropdown
    id: action
    attributes:
      label: Action type
      options: [report-only]
    validations:
      required: true
  - type: textarea
    id: explanation
    attributes:
      label: Why it exists and user impact
      description: Include regenerability, consequence, and risk/confidence rationale.
    validations:
      required: true
  - type: textarea
    id: evidence
    attributes:
      label: Authoritative sources
      description: Owner URL, supported versions, behavior, failure/fallback, access date.
    validations:
      required: true
  - type: textarea
    id: fixtures
    attributes:
      label: Fixture and malicious or negative tests
    validations:
      required: true
  - type: checkboxes
    id: boundary
    attributes:
      label: Boundary acknowledgement
      options:
        - label: The proposal contains no shell, executable, command, free-form arguments, or real user data.
          required: true
        - label: Protected resources override this rule.
          required: true
